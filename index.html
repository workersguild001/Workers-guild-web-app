  "formatted_code": "<!DOCTYPE html>\n\n<html lang=\"en\">\n\n<head>\n\n    <meta charset=\"UTF-8\">\n\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n\n    <title>The Workers Guild | Entry</title>\n\n    <script src=\"https://cdn.tailwindcss.com/\"></script>\n\n    <style>\n\n        @keyframes saw-cut {\n            0% { top: -10%; left: 50%; opacity: 0; }\n            10% { opacity: 1; }\n            90% { opacity: 1; }\n            100% { top: 110%; left: 50%; opacity: 0; }\n        }\n\n        @keyframes sparks {\n            0% { transform: scale(0) translate(0, 0); opacity: 0; }\n            50% { opacity: 1; }\n            100% { transform: scale(1.5) translate(var(--tw-x), var(--tw-y)); opacity: 0; }\n        }\n\n        @keyframes rip-left {\n            0% { transform: translateX(0); }\n            100% { transform: translateX(-100%); }\n        }\n\n        @keyframes rip-right {\n            0% { transform: translateX(0); }\n            100% { transform: translateX(100%); }\n        }\n\n        .saw-blade {\n            position: absolute;\n            width: 80px;\n            height: 80px;\n            background: #444;\n            border-radius: 50%;\n            border: 4px dashed #ff8c00;\n            z-index: 100;\n            animation: saw-cut 1.5s linear infinite;\n        }\n\n        .spark {\n            position: absolute;\n            width: 4px;\n            height: 4px;\n            background: #ff8c00;\n            border-radius: 50%;\n            box-shadow: 0 0 10px #ff8c00;\n            animation: sparks 0.4s ease-out infinite;\n        }\n\n        .ripping-left {\n            animation: rip-left 0.8s ease-in 1.2s forwards;\n        }\n\n        .ripping-right {\n            animation: rip-right 0.8s ease-in 1.2s forwards;\n        }\n\n    </style>\n\n</head>\n\n<body class=\"bg-[#131313] overflow-hidden m-0 p-0 font-sans\">\n\n    <div class=\"fixed inset-0 z-50 flex\" id=\"container\">\n        \n        <!-- Left Panel -->\n\n        <div class=\"w-1/2 h-full bg-[#1c1b1b] border-r-2 border-orange-500/20 flex items-center justify-end pr-10 ripping-left relative\">\n\n            <h1 class=\"text-7xl font-black text-white/5 uppercase tracking-tighter select-none\">The</h1>\n\n            <div class=\"absolute right-0 top-0 bottom-0 w-20 overflow-hidden pointer-events-none\" id=\"spark-container-left\"></div>\n\n        </div>\n\n        <!-- Right Panel -->\n\n        <div class=\"w-1/2 h-full bg-[#1c1b1b] border-l-2 border-orange-500/20 flex items-center justify-start pl-10 ripping-right relative\">\n\n            <h1 class=\"text-7xl font-black text-white/5 uppercase tracking-tighter select-none\">Guild</h1>\n\n            <div class=\"absolute left-0 top-0 bottom-0 w-20 overflow-hidden pointer-events-none\" id=\"spark-container-right\"></div>\n\n        </div>\n\n        <!-- The Saw -->\n\n        <div class=\"saw-blade\" id=\"saw\" style=\"display: none;\"></div>\n\n    </div>\n\n    <script>\n\n        document.addEventListener('DOMContentLoaded', () => {\n\n            const saw = document.getElementById('saw');\n\n            const leftContainer = document.getElementById('spark-container-left');\n\n            const rightContainer = document.getElementById('spark-container-right');\n\n            // Start Sawing\n\n            saw.style.display = 'block';\n\n            // Generate Sparks\n\n            const createSpark = (container) => {\n\n                const spark = document.createElement('div');\n\n                spark.className = 'spark';\n\n                spark.style.top = (Math.random() * 100) + '%';\n\n                spark.style.left = (Math.random() * 100) + '%';\n\n                spark.style.setProperty('--tw-x', (Math.random() * 100 - 50) + 'px');\n\n                spark.style.setProperty('--tw-y', (Math.random() * 100 - 50) + 'px');\n\n                container.appendChild(spark);\n\n                setTimeout(() => spark.remove(), 400);\n\n            };\n\n            const sparkInterval = setInterval(() => {\n\n                createSpark(leftContainer);\n\n                createSpark(rightContainer);\n\n            }, 50);\n\n            // Redirect after Rip\n\n            setTimeout(() => {\n\n                clearInterval(sparkInterval);\n\n                window.location.href = 'gateway.html';\n\n            }, 2500);\n\n        });\n\n    </script>\n\n</body>\n\n</html>"
}
